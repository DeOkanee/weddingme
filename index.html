<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto Wedding</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
        .folder-buttons { margin-bottom: 20px; }
        .folder-buttons button {
            padding: 10px 15px; margin-right: 10px; cursor: pointer;
            border: none; background: #0070f3; color: white; border-radius: 5px;
        }
        .folder-buttons button.active { background: #005bb5; font-weight: bold; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: white; padding: 10px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center;
        }
        .card img {
            width: 100%; height: 200px; object-fit: cover; border-radius: 5px;
        }
        .copy-btn {
            margin-top: 10px; padding: 8px; width: 100%; cursor: pointer;
            border: 1px solid #0070f3; background: white; color: #0070f3;
            border-radius: 5px; transition: 0.2s;
        }
        .copy-btn:hover { background: #0070f3; color: white; }
    </style>
</head>
<body>

    <h2>Pilih Folder Foto</h2>
    <div class="folder-buttons" id="folderButtons">
        </div>

    <div class="gallery" id="gallery">
        </div>

    <script src="data.js"></script>
    <script>
        const folderButtonsDiv = document.getElementById('folderButtons');
        const galleryDiv = document.getElementById('gallery');
        
        // Ambil URL dasar web Anda (misal: https://wedding-me-beta.vercel.app)
        const baseUrl = window.location.origin;

        // Fungsi untuk merender tombol folder
        function initGallery() {
            const folders = Object.keys(imageData);
            
            if (folders.length === 0) {
                galleryDiv.innerHTML = "<p>Tidak ada data folder yang ditemukan.</p>";
                return;
            }

            folders.forEach((folder, index) => {
                const btn = document.createElement('button');
                btn.textContent = folder.toUpperCase();
                btn.onclick = () => loadImages(folder, btn);
                folderButtonsDiv.appendChild(btn);

                // Load folder pertama secara otomatis saat web dibuka
                if (index === 0) {
                    loadImages(folder, btn);
                }
            });
        }

        // Fungsi untuk menampilkan gambar berdasarkan folder yang dipilih
        function loadImages(folderName, activeBtn) {
            // Update tampilan tombol aktif
            document.querySelectorAll('.folder-buttons button').forEach(b => b.classList.remove('active'));
            if(activeBtn) activeBtn.classList.add('active');

            // Kosongkan galeri
            galleryDiv.innerHTML = '';

            const images = imageData[folderName];
            
            if (images.length === 0) {
                galleryDiv.innerHTML = "<p>Folder ini kosong.</p>";
                return;
            }

            images.forEach(imageName => {
                // Buat URL lengkap gambar (contoh: https://web.com/images1/foto.jpg)
                const fullImageUrl = `${baseUrl}/${folderName}/${imageName}`;

                const card = document.createElement('div');
                card.className = 'card';

                const img = document.createElement('img');
                img.src = `${folderName}/${imageName}`; // Path relatif untuk preview
                img.alt = imageName;
                img.loading = "lazy"; // Biar web tidak berat

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = 'Copy URL';
                
                // Fitur Copy URL
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(fullImageUrl).then(() => {
                        copyBtn.textContent = 'Copied!';
                        copyBtn.style.background = '#28a745';
                        copyBtn.style.color = 'white';
                        copyBtn.style.border = '1px solid #28a745';
                        setTimeout(() => {
                            copyBtn.textContent = 'Copy URL';
                            copyBtn.style.background = 'white';
                            copyBtn.style.color = '#0070f3';
                            copyBtn.style.border = '1px solid #0070f3';
                        }, 2000);
                    });
                };

                card.appendChild(img);
                card.appendChild(copyBtn);
                galleryDiv.appendChild(card);
            });
        }

        // Jalankan saat web dimuat
        initGallery();
    </script>
</body>
</html>
